<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Misas Logroño</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <section id="login-screen" class="card">
      <h2>Misas Logroño - Iniciar sesión</h2>
      <form id="login-form" autocomplete="off">
        <label for="login-email">Correo</label>
        <input id="login-email" type="email" required />
        <label for="login-password">Contraseña</label>
        <input id="login-password" type="password" required />
        <button type="submit">Entrar</button>
        <p id="login-error" class="error"></p>
      </form>
      <p>Usuarios de ejemplo:</p>
      <ul>
        <li>admin@misas.local (password: admin)</li>
        <li>centro1@misas.local (password: centro1)</li>
        <li>padre1@misas.local (password: padre1)</li>
      </ul>
    </section>

    <section id="main-screen" class="hidden">
      <section class="hero">
        <div class="hero-content">
          <h2>Misas Logroño</h2>
          <p>Planificador y consulta diaria de misas en los centros parroquiales.</p>
        </div>
      </section>

      <header class="main-header">
        <div>
          <h1>Panel de control</h1>
          <p id="subtitle"></p>
        </div>
        <div class="user-info">
          <span id="current-user"></span>
          <button id="logout-btn" class="secondary">Cerrar sesión</button>
        </div>
      </header>

      <nav class="topnav">
        <button data-view="home" class="active">Inicio</button>
        <button data-view="admin" id="admin-tab" class="hidden">Admin</button>
        <button id="print-home" class="secondary">Imprimir misas mensual</button>
      </nav>

      <main>
        <section id="home-view" class="view"></section>

        <section id="admin-view" class="view hidden">
          <div class="admin-tabs">
            <button data-admin-view="centros" class="active">Centros</button>
            <button data-admin-view="sacerdotes">Sacerdotes</button>
            <button data-admin-view="misas">Misas mes</button>
            <button data-admin-view="usuarios">Usuarios</button>
          </div>

          <div id="admin-content">
            <section id="admin-centros" class="admin-section"></section>
            <section id="admin-sacerdotes" class="admin-section hidden"></section>
            <section id="admin-misas" class="admin-section hidden"></section>
            <section id="admin-usuarios" class="admin-section hidden"></section>
          </div>
        </section>
      </main>
    </section>
  </div>

  <div id="print-container" class="print-container hidden"></div>
  <script type="module">
    // Import the functions you need from the SDKs you need
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // TODO: Add SDKs for Firebase products that you want to use
    // https://firebase.google.com/docs/web/setup#available-libraries

    // Your web app's Firebase configuration
   // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDZkU1lXeAJEBaGHiDS0jM7-NUtlgOc-Ek",
  authDomain: "misas-42a29.firebaseapp.com",
  projectId: "misas-42a29",
  storageBucket: "misas-42a29.firebasestorage.app",
  messagingSenderId: "584227142626",
  appId: "1:584227142626:web:e2067317bd551f8c8197bb",
  measurementId: "G-2QVJQMQZVY"
};

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    window.db = getFirestore(app);
    window.doc = doc;
    window.getDoc = getDoc;
    window.setDoc = setDoc;
    window.collection = collection;
    window.getDocs = getDocs;
    const auth = getAuth(app);

    // Sign in anonymously
    signInAnonymously(auth).catch((error) => {
      console.error('Error signing in anonymously:', error);
    });
  </script>
  <script src="app.js"></script>
</body>
</html>
